<!-- frontend/src/app/categoria/categoria-dialog/categoria-dialog.component.html (REEMPLAZAR) -->

<div class="flex justify-between items-center px-6 py-4 border-b border-gray-100 bg-gray-50">
  <h1 mat-dialog-title class="!m-0">{{ isEditMode ? 'Editar Categoría' : 'Nueva Categoría' }}</h1>
  <button mat-icon-button type="button" (click)="cerrar()">
    <mat-icon>close</mat-icon>
  </button>
</div>

<form [formGroup]="form" (ngSubmit)="guardar()">
  <div mat-dialog-content class="!p-6 !pt-4">
    <p class="mb-4 text-gray-600">Introduce el nombre de la categoría.</p>
    <mat-form-field class="w-full">
      <mat-label>Descripción</mat-label>
      <input matInput formControlName="descripcion" required placeholder="Ej. Ferretería">
      <mat-error *ngIf="form.get('descripcion')?.hasError('required')">La descripción es requerida</mat-error>
    </mat-form-field>
  </div>

  <div mat-dialog-actions align="end" class="!px-6 !py-4 border-t border-gray-100 bg-gray-50/30">
    <button mat-stroked-button type="button" class="!rounded-lg" (click)="cerrar()">Cancelar</button>
    <button mat-flat-button color="primary" type="submit" class="!rounded-lg" [disabled]="isSaving() || form.invalid">Guardar</button>
  </div>
</form>
